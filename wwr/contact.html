<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Ready for your next big adventure? Contact White Water Rafting today to book your trip, customize group packages, or chat with our expert river guides.">
    <title>WWR Contact Us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/wwr-logo.jpg" alt="White Water Rafting logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>White Water Rafting</h1>
        <address>
            123 Main River Street<br>
            Kolob, California<br>
            <a href="tel:+19999999999">+1 999 999 9999</a><br>
            <a href="mailto:info@whitewater.com">info@whitewater.com</a>
        </address>
        <div class="flex-container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d5122.6142424298305!2d-111.6068480983917!3d41.0526231960022!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1srafting!5e0!3m2!1sen!2spy!4v1781554784016!5m2!1sen!2spy"
                  width="400" height="400" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="form-item">
                    <label for="fullname">Full name:</label>
                    <input type="text" name="fullname" id="fullname" required
                      placeholder="Jane Doe">
                </div>
                <div class="form-item">
                    <label for="useremail">E-mail address:</label>
                    <input type="email" name="useremail" id="useremail" required
                      placeholder="jane.doe@email.com">
                </div>
                <div class="radio-container">
                    <div class="radio-label">
                        <label>Message Purpose</label>
                    </div>

                    <div class="radio-input">
                        <input type="radio" id="general" name="purpose" value="general">
                        <label for="general">General Inquiry</label>
                    </div>
                    <div class="radio-input">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        <label for="reservation">Reservation Question</label>
                    </div>
                    <div class="radio-input"><input type="radio" id="website-suggestion"
                          name="purpose" value="website suggestion">
                        <label for="website-suggestion">Website Suggestion</label>
                    </div>

                </div>

                <div class="form-item message">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" required
                      placeholder="Type here"></textarea>
                </div>
                <div class="checkbox">
                    <input type="checkbox" name="newsletter" id="newsletter">
                    <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
                </div>
                <button type="submit">Get in Touch!</button>
            </form>
        </div>
        <section>
            <h2>We Are Here to Serve You</h2>
            <div class="flex-container staff">
                <figure>
                    <img src="images/employee2.webp"
                      alt="excited man with beard and glasses with thumbs up">
                    <figcaption>Joe Smith<br>Rafting guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee1.webp" alt="Woman rafting with safety equipment">
                    <figcaption>Christie Johnson<br>Activity coordinator</figcaption>
                </figure>
                <figure>
                    <img src="images/employee4.webp" alt="man with sunglasses rafting">
                    <figcaption>Logan Blake<br>Rafting guide</figcaption>

                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy;2026 | White Water Rafting | Diego Frutos</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank"><img src="images/facebook.svg"
                  alt="Circular Facebook logo in blue color"></a>
            <a href="https://instagram.com" target="_blank"><img src="images/instagram.svg"
                  alt="Circular Instagram logo in a gradient blending yellow, orange and purple color"></a>
            <a href="https://youtube.com" target="_blank"><img src="images/youtube.svg"
                  alt="Circular YouTube logo in red color"></a>
        </nav>
    </footer>
</body>

</html>
