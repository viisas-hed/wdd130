<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Quiz</title>
    <meta name="description"
      content="A quiz about HTML and CSS made by Diego Frutos as an assignment for BYU Idaho Web Fundamentals Course">
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>
        <h1>HTML and CSS Quiz</h1>
    </header>
    <main>
        <form>
            <div class="form-item">
                <label for="q1">What does the acronym HTML stand for?</label>
                <input type="text" name="q1" id="q1">
            </div>
            <div class="form-item">
                <label for="q2">How would you give the class of "green" to a div element in
                    HTML?</label>
                <textarea name="q2" id="q2"></textarea>
            </div>
            <div class="form-item">
                <label for="q3">Which of the following CSS declarations gives only top and bottom
                    padding?</label>
                <select name="q3" id="q3">
                    <option value="" selected disabled>Choose one...</option>
                    <option value="1">padding: 1rem 0 1rem 2rem;</option>
                    <option value="2">padding: 15px 15px</option>
                    <option value="3">padding: 20em 0 25em</option>
                </select>
            </div>
            <div class="form-item">
                <label for="q4">According the CSS screenshot, what will be the displayed margin (in
                    pixels) for
                    the
                    header?. Enter the number only.</label>
                <img src="images/css-screenshot.png"
                  alt="Screenshot with 3 declarations mentioning a margin for the header section">
                <input type="number" name="q4" id="q4">
            </div>
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
    <footer>&copy;2026 | HTML & CSS Quiz - Quiz Form Activity | Diego Frutos</footer>
</body>

</html>
